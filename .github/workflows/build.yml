name: Build Secure Vault APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Fix JAVA_HOME
        shell: bash
        run: |
          set -eux
          JAVA_DIR=$(dirname "$(dirname "$(readlink -f "$(which javac)")")")
          echo "JAVA_HOME=$JAVA_DIR" >> "$GITHUB_ENV"
          echo "$JAVA_DIR/bin" >> "$GITHUB_PATH"
          java -version
          javac -version

      - name: Clean old build files
        shell: bash
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf bin
          rm -rf python-for-android

      - name: Clone stable python-for-android
        shell: bash
        run: |
          set -eux
          git clone --depth 1 --branch 2024.01.21 https://github.com/kivy/python-for-android.git python-for-android
          ls -la python-for-android

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev python3-dev \
            build-essential libsqlite3-dev ccache \
            libltdl-dev libbz2-dev liblzma-dev lld

      - name: Install Python packages
        shell: bash
        run: |
          set -eux
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install Cython==0.29.37
          python -m pip install buildozer==1.5.0

      - name: Prepare Android SDK
        shell: bash
        run: |
          set -euxo pipefail

          SDK=/usr/local/lib/android/sdk
          SDKMGR=$(find "$SDK/cmdline-tools" -name sdkmanager -type f | head -1)
          AVDMGR=$(find "$SDK/cmdline-tools" -name avdmanager -type f | head -1)

          echo "Using SDK: $SDK"
          echo "Using sdkmanager: $SDKMGR"

          sudo mkdir -p "$SDK/tools/bin"
          sudo ln -sf "$SDKMGR" "$SDK/tools/bin/sdkmanager"

          if [ -n "$AVDMGR" ]; then
            sudo ln -sf "$AVDMGR" "$SDK/tools/bin/avdmanager"
          fi

          yes | "$SDKMGR" --licenses || true

          "$SDKMGR" --sdk_root="$SDK" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

          find "$SDK" -name "aidl" -type f | head -5

          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "ANDROIDSDK=$SDK" >> "$GITHUB_ENV"
          echo "ANDROIDNDK=$SDK/ndk/25.2.9519653" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$SDK/ndk/25.2.9519653" >> "$GITHUB_ENV"

          echo "$SDK/build-tools/33.0.2" >> "$GITHUB_PATH"
          echo "$SDK/platform-tools" >> "$GITHUB_PATH"

      - name: Create Buildozer symlinks
        shell: bash
        run: |
          set -eux
          mkdir -p ~/.buildozer/android/platform
          ln -sf "$ANDROID_HOME" ~/.buildozer/android/platform/android-sdk
          ln -sf "$ANDROID_HOME/ndk/25.2.9519653" ~/.buildozer/android/platform/android-ndk-r25b
          ls -la ~/.buildozer/android/platform/

      - name: Build APK
        id: build_apk
        continue-on-error: true
        shell: bash
        run: |
          set -euxo pipefail
          buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROIDSDK: ${{ env.ANDROIDSDK }}
          ANDROIDNDK: ${{ env.ANDROIDNDK }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"
          NDKAPI: "21"
          BUILDOZER_ALLOW_ORG_NAME_START: "1"

      - name: Show important log lines
        if: always()
        shell: bash
        run: |
          echo "========== POSSIBLE ERRORS =========="
          grep -niE "error:| error |failed|exception|traceback|command failed|not found|No such file|undefined reference|ld: error|clang: error|ninja: build stopped|recipe|python3.14" build.log | tail -n 150 || true
          echo ""
          echo "========== LAST 250 LINES =========="
          tail -n 250 build.log || true

      - name: Normalize APK location
        if: always()
        shell: bash
        run: |
          mkdir -p bin
          APK=$(find . -type f -name "*.apk" | head -1 || true)
          if [ -n "$APK" ]; then
            cp -f "$APK" bin/
            echo "APK copied to bin/"
            ls -lh bin/*.apk
          else
            echo "No APK found anywhere"
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Secure-Vault-APK
          path: bin/*.apk
          if-no-files-found: warn

      - name: Fail if APK missing or too small
        if: always()
        shell: bash
        run: |
          APK=$(find bin -maxdepth 1 -type f -name "*.apk" | head -1 || true)
          if [ -z "$APK" ]; then
            echo "APK was not generated."
            exit 1
          fi

          SIZE=$(stat -c%s "$APK")
          echo "APK: $APK"
          echo "Size: $SIZE bytes"

          if [ "$SIZE" -lt 3000000 ]; then
            echo "APK is too small. Build is incomplete."
            exit 1
          fi

          echo "APK looks valid."
