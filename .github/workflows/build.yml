name: Build Secure Vault APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Fix JAVA_HOME path
        shell: bash
        run: |
          set -eux
          JAVA_DIR=$(dirname "$(dirname "$(readlink -f "$(which javac)")")")
          echo "JAVA_HOME=$JAVA_DIR" >> "$GITHUB_ENV"
          echo "$JAVA_DIR/bin" >> "$GITHUB_PATH"
          echo "JAVA_HOME set to: $JAVA_DIR"
          java -version
          javac -version

      - name: Clean old build folders
        shell: bash
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf bin

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev python3-dev \
            build-essential libsqlite3-dev ccache \
            libltdl-dev libbz2-dev liblzma-dev lld

      - name: Install Python packages
        shell: bash
        run: |
          set -eux
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install Cython==0.29.37
          python -m pip install buildozer==1.5.0

      - name: Prepare Android SDK for Buildozer
        shell: bash
        run: |
          set -euxo pipefail

          SDK=/usr/local/lib/android/sdk
          SDKMGR=$(find "$SDK/cmdline-tools" -name sdkmanager -type f | head -1)
          AVDMGR=$(find "$SDK/cmdline-tools" -name avdmanager -type f | head -1)

          echo "Using SDK: $SDK"
          echo "Using sdkmanager: $SDKMGR"

          sudo mkdir -p "$SDK/tools/bin"
          sudo ln -sf "$SDKMGR" "$SDK/tools/bin/sdkmanager"

          if [ -n "$AVDMGR" ]; then
            sudo ln -sf "$AVDMGR" "$SDK/tools/bin/avdmanager"
          fi

          yes | "$SDKMGR" --licenses || true

          "$SDKMGR" --sdk_root="$SDK" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

          AIDL=$(find "$SDK" -name "aidl" -type f | head -1)
          echo "AIDL FOUND: $AIDL"

          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "ANDROIDSDK=$SDK" >> "$GITHUB_ENV"
          echo "ANDROIDNDK=$SDK/ndk/25.2.9519653" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$SDK/ndk/25.2.9519653" >> "$GITHUB_ENV"

          echo "$SDK/build-tools/33.0.2" >> "$GITHUB_PATH"
          echo "$SDK/platform-tools" >> "$GITHUB_PATH"

      - name: Create Buildozer symlinks
        shell: bash
        run: |
          set -eux
          mkdir -p ~/.buildozer/android/platform

          ln -sf "$ANDROID_HOME" ~/.buildozer/android/platform/android-sdk
          ln -sf "$ANDROID_HOME/ndk/25.2.9519653" ~/.buildozer/android/platform/android-ndk-r25b

          ls -la ~/.buildozer/android/platform/

      - name: Build APK
        shell: bash
        run: |
          set -euxo pipefail
          buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROIDSDK: ${{ env.ANDROIDSDK }}
          ANDROIDNDK: ${{ env.ANDROIDNDK }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"
          NDKAPI: "21"
          BUILDOZER_ALLOW_ORG_NAME_START: "1"

      - name: Show build outputs
        if: always()
        shell: bash
        run: |
          echo "========== BIN FOLDER =========="
          ls -lah bin || true
          echo ""
          echo "========== APK SEARCH =========="
          find . -type f \( -name "*.apk" -o -name "*.aab" \) -exec ls -lh {} \; || true
          echo ""
          echo "========== LAST 120 LINES OF LOG =========="
          tail -n 120 build.log || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Secure-Vault-APK
          path: |
            bin/*.apk
            **/*.apk
          if-no-files-found: error
