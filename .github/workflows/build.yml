name: Build Secure Vault APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Fix JAVA_HOME
        run: |
          JAVA_DIR=$(dirname $(dirname $(readlink -f $(which javac))))
          echo "JAVA_HOME=$JAVA_DIR" >> $GITHUB_ENV
          echo "Detected JAVA_HOME: $JAVA_DIR"
          java -version
          javac -version

      - name: Install Android SDK Components
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev python3-dev build-essential \
            libsqlite3-dev ccache libltdl-dev lld

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.37
          pip install buildozer==1.5.0

      - name: Setup Buildozer SDK Links
        run: |
          mkdir -p ~/.buildozer/android/platform/
          ln -sf $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
          ln -sf $ANDROID_NDK_HOME ~/.buildozer/android/platform/android-ndk-r25b

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log
          echo ""
          echo "========================================="
          echo "BUILD COMPLETE - Checking output..."
          echo "========================================="

      - name: Verify APK
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f -exec ls -lh {} \;
          echo ""
          echo "=== bin/ directory contents ==="
          ls -lah bin/ 2>/dev/null || echo "bin/ not found"
          echo ""
          echo "=== APK file size check ==="
          APK_FILE=$(find . -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            SIZE=$(stat -f%z "$APK_FILE" 2>/dev/null || stat -c%s "$APK_FILE" 2>/dev/null)
            echo "APK: $APK_FILE ($SIZE bytes)"
            if [ "$SIZE" -lt 1000000 ]; then
              echo "WARNING: APK is too small! Build may have failed."
            else
              echo "APK size looks good!"
            fi
          else
            echo "ERROR: No APK file found!"
          fi

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Secure-Vault-APK
          path: bin/*.apk
          if-no-files-found: warn
