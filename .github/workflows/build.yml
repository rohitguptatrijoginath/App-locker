name: Build Secure Vault APK

on:
  push:
    branches:
      - main
  # Manual trigger भी add किया
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # Step 1: Code checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Java setup
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 4: Cache - Build time बचाने के लिए
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # Step 5: System dependencies install
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            python3-dev \
            build-essential \
            libsqlite3-dev \
            ccache \
            libltdl-dev \
            libgdbm-dev \
            libbz2-dev \
            liblzma-dev

      # Step 6: Python packages install
      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.37
          pip install buildozer==1.5.0
          pip install virtualenv

      # Step 7: APK Build
      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: /opt/hostedtoolcache/Java_Temurin_jdk/17*/x64
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      # Step 8: Build log upload (Error आने पर देखने के लिए)
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log

      # Step 9: APK upload
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Secure-Vault-APK
          path: bin/
          if-no-files-found: error

