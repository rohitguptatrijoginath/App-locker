name: Build Secure Vault APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ── Step 1: Code checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Python setup ──
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── Step 3: Java setup ──
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Step 4: Fix JAVA_HOME ──
      - name: Fix JAVA_HOME path
        shell: bash
        run: |
          set -eux
          JAVA_DIR=$(dirname "$(dirname "$(readlink -f "$(which javac)")")")
          echo "JAVA_HOME=$JAVA_DIR" >> "$GITHUB_ENV"
          echo "$JAVA_DIR/bin" >> "$GITHUB_PATH"
          echo "JAVA_HOME set to: $JAVA_DIR"
          java -version
          javac -version

      # ── Step 5: Clean old cache ──
      - name: Clean old buildozer cache
        shell: bash
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf bin

      # ── Step 6: System dependencies ──
      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev python3-dev \
            build-essential libsqlite3-dev ccache \
            libltdl-dev libbz2-dev liblzma-dev lld

      # ── Step 7: Python packages ──
      - name: Install Python packages
        shell: bash
        run: |
          set -eux
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install Cython==0.29.37
          python -m pip install buildozer==1.5.0

      # ── Step 8: Setup Android SDK ──
      - name: Prepare Android SDK for Buildozer
        shell: bash
        run: |
          set -euxo pipefail

          SDK=/usr/local/lib/android/sdk
          SDKMGR=$(find "$SDK/cmdline-tools" -name sdkmanager -type f | head -1)
          AVDMGR=$(find "$SDK/cmdline-tools" -name avdmanager -type f | head -1)

          echo "Using SDK: $SDK"
          echo "Using sdkmanager: $SDKMGR"

          sudo mkdir -p "$SDK/tools/bin"
          sudo 
