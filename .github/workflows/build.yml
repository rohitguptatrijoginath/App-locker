name: Build Secure Vault APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ JAVA_HOME अब सही तरीके से set होगा
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ JAVA_HOME को env में save करेंगे
      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "PATH=$JAVA_HOME_17_X64/bin:$PATH" >> $GITHUB_ENV

      - name: Verify Java
        run: |
          echo "JAVA_HOME = $JAVA_HOME"
          java -version
          javac -version

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            python3-dev \
            build-essential \
            libsqlite3-dev \
            ccache \
            libltdl-dev

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.37
          pip install buildozer==1.5.0

      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Secure-Vault-APK
          path: bin/
          if-no-files-found: warn
