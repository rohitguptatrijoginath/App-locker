name: Build Secure Vault APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # पुराने broken caches हटाओ
      - name: Clean old Buildozer files
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf bin

      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev python3-dev \
            build-essential libsqlite3-dev ccache \
            libltdl-dev libbz2-dev liblzma-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install Cython==0.29.37 buildozer==1.5.0

      - name: Prepare Android SDK for Buildozer
        run: |
          echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_17_X64/bin" >> $GITHUB_PATH

          SDK_ROOT=/usr/local/lib/android/sdk
          SDKMANAGER=$(find "$SDK_ROOT/cmdline-tools" -name sdkmanager | head -1)
          AVDMANAGER=$(find "$SDK_ROOT/cmdline-tools" -name avdmanager | head -1)

          echo "Using SDK_ROOT=$SDK_ROOT"
          echo "Using SDKMANAGER=$SDKMANAGER"

          # Buildozer पुराना tools/bin path ढूंढता है
          sudo mkdir -p "$SDK_ROOT/tools/bin"
          sudo ln -sf "$SDKMANAGER" "$SDK_ROOT/tools/bin/sdkmanager"

          if [ -n "$AVDMANAGER" ]; then
            sudo ln -sf "$AVDMANAGER" "$SDK_ROOT/tools/bin/avdmanager"
          fi

          yes | "$SDKMANAGER" --licenses || true

          "$SDKMANAGER" --sdk_root="$SDK_ROOT" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

          echo "$SDK_ROOT/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$SDK_ROOT/platform-tools" >> $GITHUB_PATH

          echo "Checking aidl..."
          find "$SDK_ROOT" -name aidl -type f

      - name: Build APK
        run: |
          buildozer -v android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROIDAPI: 33
          ANDROIDMINAPI: 21
          NDKAPI: 21
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Show generated files
        if: always()
        run: |
          echo "=== BIN FOLDER ==="
          ls -lah bin || true
          echo ""
          echo "=== APK SEARCH ==="
          find . -name "*.apk" -type f -exec ls -lh {} \; || true
          echo ""
          echo "=== LAST 60 LINES OF LOG ==="
          tail -n 60 build.log || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Secure-Vault-APK
          path: bin/*.apk
          if-no-files-found: warn
