name: Build Secure Vault APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # ── Step 1: Checkout ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Python ──
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── Step 3: Java ──
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Step 4: Fix JAVA_HOME ──
      - name: Fix JAVA_HOME path
        shell: bash
        run: |
          set -eux
          JAVA_DIR=$(dirname "$(dirname "$(readlink -f "$(which javac)")")")
          echo "JAVA_HOME=$JAVA_DIR" >> "$GITHUB_ENV"
          echo "$JAVA_DIR/bin" >> "$GITHUB_PATH"
          echo "JAVA_HOME = $JAVA_DIR"
          java -version
          javac -version

      # ── Step 5: Clean ──
      - name: Clean old build
        shell: bash
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          rm -rf bin

      # ── Step 6: System deps ──
      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev python3-dev \
            build-essential libsqlite3-dev ccache \
            libltdl-dev libbz2-dev liblzma-dev lld

      # ── Step 7: Python packages ──
      - name: Install Python packages
        shell: bash
        run: |
          set -eux
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install Cython==0.29.37
          python -m pip install buildozer==1.5.0

      # ── Step 8: Setup Android SDK ──
      - name: Prepare Android SDK for Buildozer
        shell: bash
        run: |
          set -euxo pipefail

          SDK=/usr/local/lib/android/sdk
          SDKMGR=$(find "$SDK/cmdline-tools" -name sdkmanager -type f | head -1)
          AVDMGR=$(find "$SDK/cmdline-tools" -name avdmanager -type f | head -1)

          echo "SDK: $SDK"
          echo "sdkmanager: $SDKMGR"

          sudo mkdir -p "$SDK/tools/bin"
          sudo ln -sf "$SDKMGR" "$SDK/tools/bin/sdkmanager"

          if [ -n "$AVDMGR" ]; then
            sudo ln -sf "$AVDMGR" "$SDK/tools/bin/avdmanager"
          fi

          yes | "$SDKMGR" --licenses || true

          "$SDKMGR" --sdk_root="$SDK" \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;25.2.9519653"

          AIDL=$(find "$SDK" -name "aidl" -type f | head -1)
          if [ -n "$AIDL" ]; then
            echo "AIDL found: $AIDL"
          else
            echo "WARNING: aidl not found"
          fi

          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "ANDROIDSDK=$SDK" >> "$GITHUB_ENV"
          echo "ANDROIDNDK=$SDK/ndk/25.2.9519653" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$SDK/ndk/25.2.9519653" >> "$GITHUB_ENV"

          echo "$SDK/build-tools/33.0.2" >> "$GITHUB_PATH"
          echo "$SDK/platform-tools" >> "$GITHUB_PATH"

      # ── Step 9: Buildozer symlinks ──
      - name: Create Buildozer symlinks
        shell: bash
        run: |
          set -eux
          mkdir -p ~/.buildozer/android/platform

          ln -sf "$ANDROID_HOME" \
            ~/.buildozer/android/platform/android-sdk

          ln -sf "$ANDROID_HOME/ndk/25.2.9519653" \
            ~/.buildozer/android/platform/android-ndk-r25b

          ls -la ~/.buildozer/android/platform/

      # ── Step 10: BUILD (log file only) ──
      - name: Build APK
        shell: bash
        run: |
          buildozer -v android debug > build.log 2>&1 || true
          echo "Build step finished with code: $?"
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROIDSDK: ${{ env.ANDROIDSDK }}
          ANDROIDNDK: ${{ env.ANDROIDNDK }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"
          NDKAPI: "21"
          BUILDOZER_ALLOW_ORG_NAME_START: "1"

      # ── Step 11: Show REAL errors ──
      - name: Show real errors from build log
        if: always()
        shell: bash
        run: |
          echo ""
          echo "============================================"
          echo "  ERROR LINES FROM BUILD LOG"
          echo "============================================"
          echo ""
          grep -niE "error|Error|ERROR|failed|Failed|FAILED|exception|Exception|traceback|Traceback|command failed|not found|No such file|cannot find|ImportError|ModuleNotFoundError|FileNotFoundError|aidl|sdkmanager|gradle|Could not|Unable to" build.log | tail -n 80 || echo "No error lines found"
          echo ""
          echo "============================================"
          echo "  LAST 200 LINES OF BUILD LOG"
          echo "============================================"
          echo ""
          tail -n 200 build.log || echo "build.log not found"

      # ── Step 12: Check APK ──
      - name: Verify APK exists
        if: always()
        shell: bash
        run: |
          echo ""
          echo "============================================"
          echo "  CHECKING FOR APK FILES"
          echo "============================================"
          echo ""
          echo "-- bin/ folder --"
          ls -lah bin/ 2>/dev/null || echo "bin/ directory NOT found"
          echo ""
          echo "-- APK search everywhere --"
          find . -type f -name "*.apk" -exec ls -lh {} \; 2>/dev/null || echo "No .apk files found anywhere"
          echo ""
          APK=$(find . -type f -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            SIZE=$(stat -c%s "$APK" 2>/dev/null || echo "0")
            SIZE_MB=$((SIZE / 1048576))
            echo "APK FOUND: $APK"
            echo "SIZE: ${SIZE_MB} MB (${SIZE} bytes)"
            if [ "$SIZE" -gt 3000000 ]; then
              echo "STATUS: APK looks GOOD"
            else
              echo "STATUS: APK too small - build may be incomplete"
            fi
          else
            echo "STATUS: NO APK FOUND - BUILD FAILED"
          fi

      # ── Step 13: Upload log ──
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Log
          path: build.log

      # ── Step 14: Upload APK ──
      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Secure-Vault-APK
          path: |
            bin/*.apk
          if-no-files-found: warn
